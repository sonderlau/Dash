name: Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "!docs/data/**"
      - ".github/workflows/pages.yml"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Pages (frontend-only trigger)
    uses: ./.github/workflows/pages.yml

name: Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "!docs/data/**"
      - ".github/workflows/pages.yml"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# No top-level concurrency block here. The reusable workflow we call
# (pages.yml) already declares `concurrency: group: pages`, so adding the
# same group at this level deadlocks: this workflow holds `pages`, then
# calls pages.yml which waits forever for the same group. Let the callee
# own the lock.

jobs:
  deploy:
    name: Deploy Pages (frontend-only trigger)
    uses: ./.github/workflows/pages.yml
